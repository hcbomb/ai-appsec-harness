version: 0.1.0
retrieved_on: "2026-07-20"
primary_frameworks:
  - id: owasp-aisvs
    name: OWASP Artificial Intelligence Security Verification Standard
    url: https://github.com/OWASP/AISVS
    use: Primary AI security verification backbone.
  - id: owasp-aisvs-docs
    name: OWASP AISVS Docs
    url: https://owasp.org/www-project-artificial-intelligence-security-verification-standard-aisvs-docs/
    use: Human-readable standard reference.
  - id: owasp-genai-security
    name: OWASP GenAI Security Project
    url: https://genai.owasp.org/
    use: GenAI risk taxonomy and practitioner guidance.
  - id: owasp-llm-top-10
    name: OWASP Top 10 for LLM and GenAI Applications
    url: https://genai.owasp.org/llm-top-10/
    use: Risk language for threat models and review reports.
  - id: owasp-mas-threat-modeling-guide
    name: OWASP Multi-Agentic System Threat Modeling Guide
    url: https://genai.owasp.org/resource/multi-agentic-system-threat-modeling-guide-v1-0/
    use: Agentic AI and multi-agent threat modeling guide that informs MAESTRO-first review.
  - id: maestro-threat-modeling-playbook
    name: MAESTRO Threat Modeling Playbook
    url: https://agentic-threat-modeling.github.io/MAESTRO/
    use: Primary AI threat modeling method for agentic, MCP, RAG, and multi-layer AI architectures.
  - id: csa-maestro-framework
    name: CSA MAESTRO Framework
    url: https://cloudsecurityalliance.org/blog/2025/02/06/agentic-ai-threat-modeling-framework-maestro
    use: Source framework for MAESTRO agentic AI threat modeling principles and layered architecture analysis.
  - id: ai-defense-matrix
    name: AI Defense Matrix
    url: https://aidefensematrix.com/
    use: Leadership and roadmap overlay for AI defensive asset classes across NIST CSF 2.0 functions.
  - id: csa-ai-controls-matrix
    name: CSA AI Controls Matrix
    url: https://cloudsecurityalliance.org/artifacts/ai-controls-matrix-v1-1
    use: Governance and control mapping for AI systems.
  - id: csa-ai-safety
    name: CSA AI Safety Initiative
    url: https://cloudsecurityalliance.org/ai-safety-initiative
    use: CSA AI safety and agentic AI working-group context.
  - id: csa-star-ai
    name: CSA STAR for AI
    url: https://cloudsecurityalliance.org/star/ai
    use: Assurance and trust program context.
  - id: nist-ai-rmf
    name: NIST AI Risk Management Framework
    url: https://www.nist.gov/itl/ai-risk-management-framework
    use: Risk management framing.
  - id: nist-ai-600-1
    name: NIST AI 600-1 Generative AI Profile
    url: https://www.nist.gov/publications/artificial-intelligence-risk-management-framework-generative-artificial-intelligence
    use: GenAI-specific risk framing.
  - id: mitre-atlas
    name: MITRE ATLAS
    url: https://atlas.mitre.org/
    use: AI adversary tactics and techniques.
  - id: shostack-four-question-frame
    name: Shostack Four Question Frame
    url: https://github.com/adamshostack/4QuestionFrame
    use: Practical threat modeling workflow.
  - id: shostack-threat-modeling-guide
    name: Shostack Threat Modeling Guide
    url: https://shostack.org/resources/threat-modeling.html
    use: Structured, repeatable threat modeling guidance.
  - id: threat-modeling-manifesto
    name: Threat Modeling Manifesto
    url: https://www.threatmodelingmanifesto.org/
    use: Values, principles, patterns, and anti-patterns for threat modeling.
  - id: owasp-threat-modeling
    name: OWASP Threat Modeling Project
    url: https://owasp.org/www-project-threat-modeling/
    use: Threat modeling methods, tools, examples, and community guidance.
